name: Feature request
description: Suggest an idea or enhancement
title: "feat: "
labels: [enhancement]
body:
  - type: input
    id: area
    attributes:
      label: Area
      description: hardware / firmware / software / docs / manufacturing
      placeholder: firmware
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
