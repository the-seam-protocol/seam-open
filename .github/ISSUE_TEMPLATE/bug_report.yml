name: Bug report
description: Report a reproducible bug
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please provide enough detail to reproduce it."
  - type: input
    id: area
    attributes:
      label: Area
      description: hardware / firmware / software / docs / manufacturing
      placeholder: software
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
