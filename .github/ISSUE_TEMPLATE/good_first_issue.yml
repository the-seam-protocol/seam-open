name: Good first issue
description: Maintainer template for beginner-friendly tasks
title: "good-first-issue: "
labels: [good-first-issue]
body:
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: docs
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What should be implemented?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Clear checklist for completion
    validations:
      required: true
  - type: textarea
    id: pointers
    attributes:
      label: Helpful pointers
      description: Relevant files, docs, links
